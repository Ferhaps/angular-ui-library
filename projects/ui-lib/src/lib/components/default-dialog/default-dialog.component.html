<div class="modal" [style]="{ height: height() }">
	<div class="dialog-title">
		@if (withBack()) {
			<button
				type="button"
				class="back-arrow"
				aria-label="Back"
				(click)="back.emit()"
			>
				<mat-icon>keyboard_arrow_left</mat-icon>
			</button>
		}

		<h4 class="title">{{ dialogTitle() }}</h4>

		<button type="button" class="closer" mat-dialog-close aria-label="Close">
			<mat-icon>close</mat-icon>
		</button>
	</div>

	<div class="dialog-content">
		<ng-content select=".dialog-content" />
		<ng-template #tempBody />
		<ng-container *ngTemplateOutlet="templateRef() ? templateRef() : tempBody" />
	</div>
</div>
