<mat-progress-bar
	class="meter"
	[class]="level()"
	mode="determinate"
	[value]="strength()"
	aria-label="Password strength"
	[attr.aria-valuetext]="strengthLabel()"
/>

<div class="strength-label">{{ strengthLabel() }}</div>

<ul class="rules">
	@for (rule of checklist(); track rule.label) {
		<li [class.passed]="rule.passed">
			<mat-icon aria-hidden="true">
				{{ rule.passed ? 'check_circle' : 'radio_button_unchecked' }}
			</mat-icon>
			<span>{{ rule.label }}</span>
			<span class="visually-hidden">
				{{ rule.passed ? '(requirement met)' : '(requirement not met)' }}
			</span>
		</li>
	}
</ul>
