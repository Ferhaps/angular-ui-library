<div class="search-bar">
	<mat-icon>search</mat-icon>
	<input
		#searchInput
		class="search-input"
		type="search"
		name="field"
		[placeholder]="'Search ' + for()"
		autocomplete="off"
		[disabled]="isDisabled()"
		[readonly]="readonly()"
		(input)="onInput($event)"
		(blur)="onBlur()"
	/>
</div>
