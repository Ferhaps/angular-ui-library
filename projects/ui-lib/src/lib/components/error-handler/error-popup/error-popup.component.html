<lib-default-dialog [dialogTitle]="'An error has occurred'">
	<div class="dialog-content">
		<div class="status-info">
			<div>{{ error.status }}</div>
			@if (error.status) {
				<div>{{ httpStatusCodes[error.status] || 'Error' }}</div>
			}
		</div>
		<div class="error-info">
			<lib-error-display [error]="error" />
		</div>
	</div>
</lib-default-dialog>
