<mat-sidenav-container class="app-shell">
	<mat-sidenav
		#drawer
		class="sidebar"
		[mode]="isHandset() ? 'over' : 'side'"
		[opened]="!isHandset()"
		[fixedInViewport]="isHandset()"
	>
		<div class="brand">
			<span class="brand-mark">UI</span>
			<span class="brand-text">
				<strong>easy-ui-lib</strong>
				<small class="muted">component showcase</small>
			</span>
		</div>

		<mat-nav-list>
			<a
				mat-list-item
				routerLink="/"
				routerLinkActive
				#home="routerLinkActive"
				[routerLinkActiveOptions]="{ exact: true }"
				[activated]="home.isActive"
				(click)="onNavigate(drawer)"
			>
				<mat-icon matListItemIcon>home</mat-icon>
				<span matListItemTitle>Overview</span>
			</a>

			@for (item of navItems; track item.path) {
				<a
					mat-list-item
					[routerLink]="item.path"
					routerLinkActive
					#rla="routerLinkActive"
					[activated]="rla.isActive"
					[matTooltip]="item.title"
					matTooltipPosition="right"
					[matTooltipShowDelay]="400"
					(click)="onNavigate(drawer)"
				>
					<mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
					<span matListItemTitle>{{ item.title }}</span>
					<span matListItemMeta class="kind">{{ item.kind }}</span>
				</a>
			}
		</mat-nav-list>

		<span class="sidebar-spacer"></span>

		<mat-nav-list>
			<a
				mat-list-item
				href="https://www.npmjs.com/package/@ferhaps/easy-ui-lib"
				target="_blank"
				rel="noopener"
			>
				<mat-icon matListItemIcon>open_in_new</mat-icon>
				<span matListItemTitle>View on npm</span>
			</a>
		</mat-nav-list>
	</mat-sidenav>

	<mat-sidenav-content class="content-wrap">
		<mat-toolbar class="topbar">
			@if (isHandset()) {
				<button
					mat-icon-button
					aria-label="Toggle navigation"
					(click)="drawer.toggle()"
				>
					<mat-icon>menu</mat-icon>
				</button>
			}
			<span class="topbar-title mono">&#64;ferhaps/easy-ui-lib</span>
			<span class="topbar-spacer"></span>
			<button
				mat-icon-button
				[matTooltip]="theme.dark() ? 'Switch to light mode' : 'Switch to dark mode'"
				aria-label="Toggle dark mode"
				(click)="theme.toggle()"
			>
				<mat-icon>{{ theme.dark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
			</button>
		</mat-toolbar>

		<main class="content">
			<router-outlet />
		</main>
	</mat-sidenav-content>
</mat-sidenav-container>

<!-- Mounted once near the app root, exactly as a consuming app would. -->
<lib-error-handler />
<lib-global-loader />
