<app-page-heading
	title="Table"
	kind="Component · TableComponent<T>"
	lead="A single generic component driven entirely by a typed Config<T>
	object. It emits one TableEvent<T> output for every interaction —
	sorting, selection, drag-drop, row options, the add button and
	infinite scroll."
/>

<app-demo-card
	heading="Sorting · row options · conditional styling · infinite scroll"
	hint="single-row select"
>
	<div class="table-host">
		<eui-table [config]="sortableConfig()" (action)="onSortable($event)" />
	</div>
	<app-event-log title="TableEvent output" [events]="sortableLog()" />
	<app-code-block [code]="sortableSnippet" class="code-block" />
</app-demo-card>

<app-demo-card
	heading="Drag to reorder · multi-select · add button"
	hint="draggable disables sort"
>
	<div class="table-host short">
		<eui-table [config]="draggableConfig()" (action)="onDraggable($event)" />
	</div>
	<app-event-log title="TableEvent output" [events]="draggableLog()" />
	<app-code-block [code]="draggableSnippet" class="code-block" />
</app-demo-card>

<app-demo-card
	heading="Loading &amp; empty states"
	hint="config-driven: loading + emptyMessage"
>
	<div class="state-buttons">
		<button mat-stroked-button (click)="simulateLoading()">
			Simulate loading (1.5s)
		</button>
		<button mat-stroked-button (click)="toggleData()">
			{{ statesData().length ? "Clear data" : "Load data" }}
		</button>
	</div>
	<div class="table-host short">
		<eui-table [config]="statesConfig()" />
	</div>
	<app-code-block [code]="statesSnippet" class="code-block" />
</app-demo-card>
