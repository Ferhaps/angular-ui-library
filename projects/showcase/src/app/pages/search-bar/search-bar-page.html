<app-page-heading
	title="Search Bar"
	kind="Component · SearchBarComponent"
	lead="A debounced search input implemented as a ControlValueAccessor.
	Wire it to a form control (reactive or template-driven) like any native
	input — it emits the trimmed term after typing stops (300ms by default,
	set via [debounceMs]), de-duplicated."
/>

<app-demo-card
	heading="Reactive form control"
	hint="emits 300ms after you stop typing"
>
	<div class="row">
		<lib-search-bar for="fruit" [formControl]="searchCtrl" />
		<mat-slide-toggle [checked]="disabled()" (change)="toggleDisabled()">
			Disabled
		</mat-slide-toggle>
	</div>

	<dl class="readout">
		<dt>Control value</dt>
		<dd class="mono">{{ term() ? '"' + term() + '"' : '—' }}</dd>
		<dt>Status</dt>
		<dd class="mono">{{ disabled() ? 'DISABLED' : 'VALID' }}</dd>
	</dl>
</app-demo-card>

<app-demo-card heading="Live filtering" hint="{{ filtered().length }} match(es)">
	@if (filtered().length) {
		<mat-chip-set>
			@for (fruit of filtered(); track fruit) {
				<mat-chip disableRipple>{{ fruit }}</mat-chip>
			}
		</mat-chip-set>
	} @else {
		<p class="muted">No fruit matches “{{ term() }}”.</p>
	}
</app-demo-card>

<app-demo-card heading="Usage">
	<p class="usage-label">Reactive forms</p>
	<app-code-block [code]="reactiveSnippet" />
	<p class="usage-label">Template-driven forms</p>
	<app-code-block [code]="templateDrivenSnippet" />
</app-demo-card>
