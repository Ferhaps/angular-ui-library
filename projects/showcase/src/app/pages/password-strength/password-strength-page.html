<app-page-heading
	title="Password Strength"
	kind="Component · eui-password-strength"
	lead="A live strength meter with a per-rule checklist. It evaluates the
	exact same rules as euiPasswordValidator — configure both identically and
	the meter reaches Strong precisely when the validator passes."
/>

<app-demo-card heading="Default rules" hint="8+ chars, upper, lower, digit, special">
	<mat-form-field appearance="outline" class="field">
		<mat-label>Password</mat-label>
		<input
			matInput
			type="password"
			[(ngModel)]="password"
			autocomplete="new-password"
		/>
	</mat-form-field>
	<eui-password-strength [value]="password()" />
	<p class="muted note">
		<mat-icon>lightbulb</mat-icon>
		<span>
			Best paired with the <code>euiPasswordValidator</code> directive on the
			same input — give both the same rule inputs and the meter reaches
			<strong>Strong</strong> exactly when the control becomes valid. Here the
			meter is shown standalone just to isolate it.
		</span>
	</p>
</app-demo-card>

<app-demo-card heading="Custom rules" hint="[minLength]=12, no special character">
	<mat-form-field appearance="outline" class="field">
		<mat-label>Passphrase</mat-label>
		<input
			matInput
			type="password"
			[(ngModel)]="customPassword"
			autocomplete="new-password"
		/>
	</mat-form-field>
	<eui-password-strength
		[value]="customPassword()"
		[minLength]="12"
		[requireSpecial]="false"
	/>
</app-demo-card>

<app-demo-card heading="Usage">
	<app-code-block [code]="snippet" />
</app-demo-card>
